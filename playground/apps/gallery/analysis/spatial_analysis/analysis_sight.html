<!DOCTYPE html>
<html lang="zh-cn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="/dist/syearth.min.js"></script>
    <script src="/dist/thirdparty/lil-gui@0.21.js"></script>
    <title>analysis_sight</title>
  </head>
  <body>
    <style>
      @import url(/apps/style/global.css);
    </style>

    <div id="earthContainer"></div>
    <script type="module">
      let earth = new SyEarth.Earth("earthContainer", {
        baseLayer: {
          name: "ArcGIS影像",
          url: "https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
          maximumLevel: 16,
          type: "xyz",
          show: true,
        },
      });
      earth.scene.globe.depthTestAgainstTerrain = true;
      // const TILE_URL = "/apps/sampledata/3dtiles/nanjibaimo/tileset.json";
      // const tileset = await Cesium.Cesium3DTileset.fromUrl(TILE_URL);
      // tileset.backFaceCulling = false;
      // earth.scene.primitives.add(tileset);
      // earth.zoomTo(tileset, new Cesium.HeadingPitchRange(0, -0.5, 0));

      const tileset = await Cesium.Cesium3DTileset.fromUrl(
        "http://earthsdk.com/v/last/Apps/assets/dayanta/tileset.json"
      );
      earth.scene.primitives.add(tileset);
      earth.zoomTo(tileset);

      let arr = [];
      let interGraphic;

      let rayLinehandler = new SyEarth.RayLineHandler(earth);
      let handler = new Cesium.ScreenSpaceEventHandler(earth.scene.canvas);
      handler.setInputAction(function (evt) {
        let cartesian =
          earth.scene.pickPosition(evt.position) ||
          earth.scene.globe.pick(
            earth.camera.getPickRay(evt.position),
            earth.scene
          );

        console.info(cartesian);

        rayLinehandler.enabled = true;
        rayLinehandler.addPoint3D(cartesian);

        // rayLinehandler.end.addEventListener((array) => {
        //   //......do something
        //   console.info(array);
        //   // rayLinehandler.end.removeEventListener();
        //   //   handler.removeInputAction(Cesium.ScreenSpaceEventType.LEFT_CLICK);
        // });
        arr.push(cartesian);
        interGraphic && earth.entities.remove(interGraphic);

        if (arr.length == 2) {
          let iPoint = rayLinehandler.getIntersectPoint(arr[0], arr[1]);
          interGraphic = earth.entities.add({
            position: iPoint.position,
            point: {
              pixelSize: 10,
              color: Cesium.Color.BLUE,
              disableDepthTestDistance: Number.POSITIVE_INFINITY,
            },
          });
          arr.length = 0;
        }
      }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

      function unbindInputAction(handler) {
        handler.removeInputAction(Cesium.ScreenSpaceEventType.LEFT_CLICK);
        handler && handler.destroy();
      }

      const gui = new lil.GUI({ autoPlace: true });
      gui.domElement.id = "GuiRight";
      const sightFolder = gui.addFolder("通视分析");
      sightFolder.open();
      let sightSelectActions = {
        clear: function () {
          rayLinehandler.clear();
        },
        destroy: function () {
          rayLinehandler.destroy();
        },
        FixSight: function () {
          rayLinehandler.startPoint = new Cesium.Cartesian3(
            -1715457.3598658706,
            4993539.111140661,
            3566893.0475328476
          );

          rayLinehandler.endPoint = new Cesium.Cartesian3(
            -1715372.9282324107,
            4993555.823019448,
            3566810.079665687
          );
          rayLinehandler.executeAnalysis();
        },
      };
      sightFolder.add(sightSelectActions, "clear").name("清除");
      sightFolder.add(sightSelectActions, "destroy").name("销毁");
      sightFolder.add(sightSelectActions, "FixSight").name("固定通视");
    </script>
  </body>
</html>
