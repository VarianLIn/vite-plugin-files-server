<!doctype html>
<html lang="zh-cn">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="group:label" content="加载点云3dtiles" />
        <script src="/dist/syearth.min.js"></script>
        <title>load 3dtiles pointcloud</title>
    </head>
    <body>
        <style>
            @import url(/apps/style/global.css);
        </style>

        <div id="earthContainer"></div>
        <script type="module">
            let options = await SyEarth.Utils.loadJSON('/apps/sampledata/config/baseConfig.json');
            let earth = new SyEarth.Earth('earthContainer', options);

            // const TILE_URL = '/apps/sampledata/PointCloud/PointCloudBatched/tileset.json';
            const TILE_URL = '/apps/sampledata/PointCloud/rabbit/tileset.json';

            const tileset = await Cesium.Cesium3DTileset.fromUrl(TILE_URL);
            earth.scene.primitives.add(tileset);
            earth.zoomTo(tileset, new Cesium.HeadingPitchRange(0, -0.5, 0));
        </script>
    </body>
</html>
